version: '3.8'

services:
  # 1. Zookeeper: Required for Kafka cluster orchestration
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # 2. Apache Kafka: The central distributed message broker
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # 3. Apache Cassandra: Primary NoSQL metadata database
  cassandra:
    image: cassandra:latest
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=EmailCluster
    volumes:
      - cassandra_data:/var/lib/cassandra

  # 4. Elasticsearch: Secondary index for full-text search
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  # 5. Spring Boot Backend: Core business logic and API
  email-backend:
    build: ./backend
    ports:
      - "8080:8080" # REST APIs and WebSocket endpoints
      - "2525:25"   # SMTP Receiver listener (Mapped host 2525 to container 25 to avoid root requirement)
    depends_on:
      - kafka
      - cassandra
      - elasticsearch
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_CASSANDRA_CONTACTPOINTS=cassandra
      - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200
    volumes:
      - attachments_data:/app/attachments
    restart: on-failure

  # 6. Vue.js Frontend: Nginx static file server
  email-frontend:
    build: ./frontend
    ports:
      - "8000:80"
    depends_on:
      - email-backend
    restart: always

volumes:
  cassandra_data:
  es_data:
  attachments_data:
